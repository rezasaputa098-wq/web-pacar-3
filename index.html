<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Nuraisyah 🐾</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", sans-serif;
}


body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#fff4f4,#fff9ed);
}


.scene{
height:100vh;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}


.content{
position:absolute;
top:20%;
width:90%;
text-align:center;
z-index:5;
}


h1{
font-size:32px;
color:#806060;
}


#text{
margin-top:20px;
font-size:18px;
color:#987777;
min-height:90px;
line-height:1.7;
}


button{

background:#dba4a4;
color:white;
border:none;
padding:14px 28px;
border-radius:40px;
cursor:pointer;
font-size:15px;

box-shadow:0 10px 25px #dba4a455;

}



/* KUCING */

.cat{

position:absolute;
bottom:80px;
left:-100px;
font-size:75px;
cursor:pointer;
animation:jalan 8s linear infinite;
z-index:3;

}


@keyframes jalan{

0%{
left:-100px;
}

50%{
left:50%;
}

100%{
left:110%;
}

}



/* paw */

.paw{

position:absolute;
font-size:20px;
opacity:.5;
animation:turun 5s linear;

}


@keyframes turun{

from{
top:-50px;
}

to{
top:100vh;
}

}





/* cards */


.cards{

display:none;
margin-top:20px;

}


.card{

background:white;
width:270px;
margin:15px auto;
padding:20px;

border-radius:25px;

box-shadow:0 15px 40px #0002;

animation:muncul 1s;

color:#765858;

}



@keyframes muncul{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}





/* surat */

.letter{

display:none;
position:absolute;
top:12%;
width:100%;
padding:25px;
z-index:10;

}



.paper{

background:white;
max-width:450px;
margin:auto;
padding:30px;

border-radius:25px;

line-height:1.8;

color:#765858;

box-shadow:0 20px 50px #0003;

}




#letterText{

min-height:200px;

}





/* ending */

.ending{

display:none;
position:absolute;
top:35%;
width:100%;
text-align:center;
font-size:30px;
color:#b46f80;
z-index:20;

}


.small{

font-size:18px;
margin-top:20px;

}





.heart{

position:absolute;
font-size:30px;

animation:naik 3s linear forwards;

}



@keyframes naik{

0%{

bottom:0;
opacity:1;
transform:scale(1);

}


100%{

bottom:100vh;
opacity:0;
transform:scale(2);

}

}



</style>

</head>



<body>


<div class="scene">


<div class="content">


<h1>🐾 For Nuraisyah</h1>


<div id="text"></div>


<button id="startBtn" onclick="startStory()">
ikuti kucingnya 🤍
</button>



<div class="cards">


<div class="card">
🐾 aku suka cara kamu cerita hal random
</div>


<div class="card">
🐾 aku suka cara kamu perhatian tanpa sadar
</div>


<div class="card">
🐾 aku suka cara kamu memperlakukan aku
</div>


</div>


</div>




<div class="cat" onclick="clickCat()">

🐈

</div>





<div class="letter">


<div class="paper">


<div id="letterText"></div>


<br>


<button onclick="finish()">

lanjut 🐾

</button>


</div>


</div>





<div class="ending">


<div>

💗💗💗

</div>


Thank you for being you, Nuraisyah


<div class="small">


kamu selalu cantik dengan caramu sendiri 🤍


<br>


love u 🐾

</div>


</div>




</div>





<script>



let intro=[

"hai Nuraisyah...",

"aku punya sesuatu kecil buat kamu",

"buat kamu yang selalu cantik dengan caramu sendiri 🐾",

"jadi jangan buru-buru pergi ya 🤍"

];



let index=0;



function showIntro(){


if(index<intro.length){


document.getElementById("text").innerHTML=intro[index];


index++;


setTimeout(showIntro,1700);


}


}



showIntro();






function startStory(){


document.getElementById("startBtn").style.display="none";


document.querySelector(".cards").style.display="block";


setTimeout(()=>{


document.querySelector(".letter").style.display="block";


typeLetter();


},4500);



}






function clickCat(){


let cat=document.querySelector(".cat");


cat.innerHTML="😺";


setTimeout(()=>{

cat.innerHTML="🐈";

},800);



}







let message=

"Nuraisyah, aku nggak janji semuanya selalu sempurna...<br><br>"+

"tapi aku ingin terus belajar ngerti kamu dan tumbuh bersama kamu.<br><br>"+

"aku suka cara kamu memperlakukan aku, "+
"hal kecil yang mungkin kamu anggap biasa.<br><br>"+

"buat aku, kamu itu cantik bukan cuma dari luar, "+
"tapi dari cara kamu jadi diri kamu sendiri.<br><br>"+

"semoga kamu selalu ingat, ada seseorang yang senang melihat kamu bahagia 🤍";




let char=0;



function typeLetter(){


if(char < message.length){


document.getElementById("letterText").innerHTML =
message.substring(0,char);


char++;


setTimeout(typeLetter,35);


}



}







function finish(){


document.querySelector(".letter").style.display="none";


document.querySelector(".ending").style.display="block";



for(let i=0;i<35;i++){


let heart=document.createElement("div");


heart.className="heart";


heart.innerHTML="❤️";


heart.style.left=Math.random()*100+"%";


heart.style.animationDuration=
(2+Math.random()*3)+"s";


document.querySelector(".scene").appendChild(heart);



}



}







setInterval(()=>{


let paw=document.createElement("div");


paw.className="paw";


paw.innerHTML="🐾";


paw.style.left=Math.random()*100+"%";


paw.style.animationDuration=
(3+Math.random()*3)+"s";



document.querySelector(".scene").appendChild(paw);



setTimeout(()=>{

paw.remove();

},5000);



},800);





</script>


</body>
</html>
