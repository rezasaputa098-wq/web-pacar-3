<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Little Cat For You 🐾</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#fff5f5,#fffaf0);
    display:flex;
    justify-content:center;
    align-items:center;
}


.scene{
    width:100%;
    height:100vh;
    position:relative;
    text-align:center;
    overflow:hidden;
}


.title{
    position:absolute;
    top:25%;
    width:100%;
    font-size:28px;
    color:#765858;
    letter-spacing:1px;
}


#text{
    margin-top:20px;
    font-size:18px;
    color:#8b6b6b;
    min-height:80px;
    padding:20px;
}


/* tombol */

button{
    border:none;
    padding:14px 25px;
    border-radius:30px;
    background:#dca6a6;
    color:white;
    cursor:pointer;
    font-size:15px;
    box-shadow:0 10px 20px #dca6a655;
}



/* kucing */

.cat{
    position:absolute;
    bottom:90px;
    left:-100px;
    font-size:70px;
    cursor:pointer;
    animation:walk 8s linear infinite;
}


@keyframes walk{

0%{
left:-100px;
}

50%{
left:50%;
}

100%{
left:110%;
}

}



.paw{
position:absolute;
font-size:20px;
opacity:.4;
animation:fall 5s linear infinite;
}


@keyframes fall{

from{
transform:translateY(-50px);
}

to{
transform:translateY(100vh);
}

}



/* card */

.cards{

display:none;
position:absolute;
top:20%;
width:100%;
}


.card{

background:white;
width:260px;
margin:15px auto;
padding:20px;
border-radius:20px;
box-shadow:0 15px 40px #0001;

animation:up 1s;

}


@keyframes up{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}



/* surat */


.letter{

display:none;
position:absolute;
top:15%;
width:100%;
padding:30px;

}


.paper{

background:#fff;
max-width:450px;
margin:auto;
padding:30px;
border-radius:25px;
line-height:1.8;
box-shadow:0 20px 50px #0002;
color:#765858;

}



.ending{

display:none;
position:absolute;
top:35%;
width:100%;
font-size:30px;
color:#b56b7a;

}



.heart{

position:absolute;
font-size:30px;
animation:heart 3s infinite;

}



@keyframes heart{

0%{
transform:translateY(0) scale(1);
opacity:1;
}

100%{
transform:translateY(-300px) scale(2);
opacity:0;
}

}


</style>

</head>


<body>


<div class="scene">


<div class="title">

<div id="text"></div>

<button onclick="start()">ikuti kucingnya 🐾</button>

</div>



<div class="cat" onclick="petCat()">
🐈
</div>



<div class="cards">

<div class="card">
🐾 aku suka cara kamu cerita hal random
</div>


<div class="card">
🐾 aku suka cara kamu perhatian tanpa sadar
</div>


<div class="card">
🐾 aku suka kamu tetap jadi diri kamu sendiri
</div>


</div>



<div class="letter">

<div class="paper">

<div id="letterText"></div>


<br>

<button onclick="finish()">
lanjut 🤍
</button>


</div>


</div>



<div class="ending">

<div>
💗
</div>

thank you for being you

<br>

<span style="font-size:20px">
love u 🐾
</span>


</div>


</div>





<script>


let intro=[
"hai kamu...",
"aku punya sesuatu kecil buat kamu",
"jadi jangan buru-buru pergi ya 🐾"
];


let i=0;


function typeIntro(){

if(i<intro.length){

document.getElementById("text").innerHTML=intro[i];

i++;

setTimeout(typeIntro,1500);

}

}


typeIntro();





function start(){

document.querySelector("button").style.display="none";


document.querySelector(".cards").style.display="block";


setTimeout(()=>{

document.querySelector(".letter").style.display="block";

},5000);


}





function petCat(){

let cat=document.querySelector(".cat");

cat.innerHTML="😺";


setTimeout(()=>{

cat.innerHTML="🐈";

},1000);


}





let letter=
"aku nggak janji semuanya selalu sempurna...<br><br>"+
"tapi aku ingin terus belajar ngerti kamu.<br><br>"+
"aku suka cara kamu memperlakukan aku, "+
"hal kecil yang mungkin kamu anggap biasa.<br><br>"+
"semoga kamu selalu ingat kalau ada seseorang yang senang melihat kamu bahagia 🤍";


function showLetter(){

document.getElementById("letterText").innerHTML=letter;

}


setTimeout(showLetter,7000);





function finish(){

document.querySelector(".letter").style.display="none";

document.querySelector(".ending").style.display="block";


for(let x=0;x<25;x++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.bottom="0px";


document.querySelector(".scene").appendChild(h);

}


}







// paw random

setInterval(()=>{

let p=document.createElement("div");

p.className="paw";

p.innerHTML="🐾";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=
(3+Math.random()*4)+"s";


document.querySelector(".scene").appendChild(p);


setTimeout(()=>{
p.remove();
},5000);


},700);



</script>


</body>
</html>
